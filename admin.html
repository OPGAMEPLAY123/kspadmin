<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — KSP Clinic</title>
  <link rel="stylesheet" href="admin.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://meet.jit.si/external_api.js"></script>
</head>
<body>

<div id="adminPanel">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-brand">
        <div class="brand-icon"><i class="fa-solid fa-stethoscope"></i></div>
        <div>
          <div class="brand-name">KSP Clinic</div>
          <div class="brand-sub">Admin Dashboard</div>
        </div>
      </div>
      <button class="sb-close" onclick="closeSidebar()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="switchTab('dashboard',this)">
        <i class="fa-solid fa-chart-pie"></i> Dashboard
      </button>
      <button class="nav-item" onclick="switchTab('offline',this)">
        <i class="fa-solid fa-hospital-user"></i> Offline Appointments
        <span class="nav-badge" id="offlineBadge" style="display:none"></span>
      </button>
      <button class="nav-item" onclick="switchTab('online',this)">
        <i class="fa-solid fa-video"></i> Online Consultations
        <span class="nav-badge" id="onlineBadge" style="display:none"></span>
      </button>
      <button class="nav-item" onclick="switchTab('users',this)">
        <i class="fa-solid fa-users"></i> Users
      </button>
    </nav>
    <div class="sidebar-foot">
      <div class="admin-tag">
        <div class="admin-av"><i class="fa-solid fa-user-shield"></i></div>
        <div>
          <div class="admin-name">Dr. Aejaz Kotwal</div>
          <div class="admin-role">Administrator</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div class="main-wrap">
    <header class="topbar">
      <button class="hamburger" onclick="openSidebar()"><i class="fa-solid fa-bars"></i></button>
      <h2 class="topbar-title" id="topbarTitle">Dashboard</h2>
      <div class="topbar-badge"><i class="fa-solid fa-user-shield"></i></div>
    </header>

    <!-- ── TAB: DASHBOARD ── -->
    <section class="tab active" id="tab-dashboard">
      <div class="tab-scroll">
        <div class="stats-grid">
          <div class="stat-box"><div class="stat-ico ic-users"><i class="fa-solid fa-users"></i></div><div><div class="sn" id="sUsers">0</div><div class="sl">Total Users</div></div></div>
          <div class="stat-box"><div class="stat-ico ic-total"><i class="fa-solid fa-calendar-days"></i></div><div><div class="sn" id="sTotal">0</div><div class="sl">Total Bookings</div></div></div>
          <div class="stat-box"><div class="stat-ico ic-pending"><i class="fa-solid fa-hourglass-half"></i></div><div><div class="sn" id="sPending">0</div><div class="sl">Pending</div></div></div>
          <div class="stat-box"><div class="stat-ico ic-payment"><i class="fa-solid fa-money-bill"></i></div><div><div class="sn" id="sPayment">0</div><div class="sl">Awaiting Payment</div></div></div>
          <div class="stat-box"><div class="stat-ico ic-approved"><i class="fa-solid fa-circle-check"></i></div><div><div class="sn" id="sApproved">0</div><div class="sl">Approved</div></div></div>
          <div class="stat-box"><div class="stat-ico ic-completed"><i class="fa-solid fa-star"></i></div><div><div class="sn" id="sCompleted">0</div><div class="sl">Completed</div></div></div>
        </div>
        <div class="sec-title">Recent Activity</div>
        <div id="recentList" class="table-wrap"><div class="empty-msg"><i class="fa-solid fa-calendar-xmark"></i><p>Loading...</p></div></div>
      </div>
    </section>

    <!-- ── TAB: OFFLINE ── -->
    <section class="tab" id="tab-offline">
      <div class="tab-scroll">
        <div class="filter-row">
          <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="offSearch" placeholder="Search name, email, ID..." oninput="filterList('offline')"/></div>
          <div class="filter-grp">
            <input type="date" id="offDate" onchange="filterList('offline')"/>
            <select id="offStatus" onchange="filterList('offline')">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>
        <div id="offlineList" class="table-wrap"><div class="empty-msg"><i class="fa-solid fa-calendar-xmark"></i><p>Loading...</p></div></div>
      </div>
    </section>

    <!-- ── TAB: ONLINE ── -->
    <section class="tab" id="tab-online">
      <div class="tab-scroll">
        <div class="filter-row">
          <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="onSearch" placeholder="Search name, email, ID..." oninput="filterList('online')"/></div>
          <div class="filter-grp">
            <input type="date" id="onDate" onchange="filterList('online')"/>
            <select id="onStatus" onchange="filterList('online')">
              <option value="">All Status</option>
              <option value="payment_uploaded">Payment Uploaded</option>
              <option value="pending_approval">Pending Approval</option>
              <option value="approved">Approved</option>
              <option value="completed">Completed</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>
        <div id="onlineList" class="table-wrap"><div class="empty-msg"><i class="fa-solid fa-video"></i><p>Loading...</p></div></div>
      </div>
    </section>

    <!-- ── TAB: USERS ── -->
    <section class="tab" id="tab-users">
      <div class="tab-scroll">
        <div id="userGrid" class="user-grid"><div class="empty-msg" style="grid-column:1/-1"><i class="fa-solid fa-users"></i><p>Loading users...</p></div></div>
      </div>
    </section>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal" onclick="bgClose(event)">
  <div class="modal-box">
    <button class="modal-x" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- VIDEO MODAL -->
<div class="modal-bg" id="videoModal" onclick="bgCloseVideo(event)">
  <div class="modal-box video-modal-box">
    <button class="modal-x" onclick="closeVideoModal()"><i class="fa-solid fa-xmark"></i></button>
    <div class="video-modal-title"><i class="fa-solid fa-video"></i> Video Consultation</div>
    <div id="adminJitsi" style="width:100%;height:460px;border-radius:12px;overflow:hidden;background:#000;"></div>
    <div class="video-controls-admin">
      <button class="vc-btn" onclick="adminToggleMic()"><i class="fa-solid fa-microphone" id="adminMicIcon"></i></button>
      <button class="vc-btn end-btn" onclick="adminEndCall()"><i class="fa-solid fa-phone-slash"></i></button>
      <button class="vc-btn" onclick="adminToggleCam()"><i class="fa-solid fa-video" id="adminCamIcon"></i></button>
    </div>
  </div>
</div>

<div class="toast" id="adminToast"></div>
<script src="admin.js"></script>
</body>
</html>
